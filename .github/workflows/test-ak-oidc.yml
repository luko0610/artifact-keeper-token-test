name: Test AK OIDC Token Exchange
on: workflow_dispatch

permissions:
  id-token: write   # required to request the GitHub OIDC JWT
  contents: read

env:
  AK_URL: https://stevens-glance-unit-land.trycloudflare.com
  AK_PROVIDER_ID: e698157e-485d-4478-9857-8de8e5efa9de
  AK_REGISTRY: stevens-glance-unit-land.trycloudflare.com
  AK_REPO: ci-test

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange GitHub OIDC token for Artifact Keeper token
        id: ak_token
        run: |
          echo "==> Requesting GitHub OIDC JWT (audience: artifact-keeper)..."
          GITHUB_JWT=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=artifact-keeper" \
            | jq -r '.value')

          if [ -z "$GITHUB_JWT" ] || [ "$GITHUB_JWT" = "null" ]; then
            echo "ERROR: Failed to obtain GitHub OIDC JWT"
            exit 1
          fi
          echo "JWT obtained (${#GITHUB_JWT} chars)"

          echo ""
          echo "==> Exchanging JWT for Artifact Keeper access token..."
          # The CI JWT is passed in the Authorization header (not the body) to
          # keep it out of access logs and HTTP request traces on the server.
          RESPONSE=$(curl -sf -X POST \
            "$AK_URL/api/v1/auth/ci/token" \
            -H "Authorization: Bearer $GITHUB_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"provider_id\": \"$AK_PROVIDER_ID\"}")

          echo ""
          echo "==> Response:"
          echo "$RESPONSE" | jq '{username, token_type, expires_in}'

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: No access_token in response"
            exit 1
          fi

          # The response now includes the username directly — no /auth/me needed.
          CI_USERNAME=$(echo "$RESPONSE" | jq -r '.username')
          if [ -z "$CI_USERNAME" ] || [ "$CI_USERNAME" = "null" ]; then
            echo "ERROR: No username in response"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "ci_username=$CI_USERNAME" >> "$GITHUB_OUTPUT"
          echo "==> SUCCESS! Authenticated as: $CI_USERNAME"

      - name: Docker login to Artifact Keeper registry
        run: |
          echo "${{ steps.ak_token.outputs.access_token }}" | \
            docker login "$AK_REGISTRY" \
              --username "${{ steps.ak_token.outputs.ci_username }}" \
              --password-stdin

      - name: Build and push minimal image
        run: |
          IMAGE="$AK_REGISTRY/$AK_REPO/hello:${{ github.run_number }}"
          IMAGE_LATEST="$AK_REGISTRY/$AK_REPO/hello:latest"

          echo "==> Building minimal image..."
          printf 'FROM scratch\nCOPY /etc/hostname /hostname\n' > Dockerfile
          # Use busybox as a real pullable base image instead of scratch+COPY trick
          printf 'FROM busybox:latest\nLABEL org.opencontainers.image.source="https://github.com/%s"\nLABEL build.run="%s"\n' \
            "$GITHUB_REPOSITORY" "$GITHUB_RUN_NUMBER" > Dockerfile

          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .

          echo ""
          echo "==> Pushing $IMAGE ..."
          docker push "$IMAGE"

          echo ""
          echo "==> Pushing $IMAGE_LATEST ..."
          docker push "$IMAGE_LATEST"

          echo ""
          echo "==> SUCCESS! Pushed to $AK_REGISTRY/$AK_REPO/hello"

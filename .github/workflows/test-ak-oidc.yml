name: Test AK OIDC Token Exchange
on: workflow_dispatch

permissions:
  id-token: write
  contents: read

env:
  AK_URL: https://prairie-programs-coastal-mathematical.trycloudflare.com
  AK_PROVIDER_ID: e698157e-485d-4478-9857-8de8e5efa9de
  AK_REGISTRY: prairie-programs-coastal-mathematical.trycloudflare.com

jobs:
  # --- Docker ---
  push-docker:
    runs-on: ubuntu-latest
    env:
      AK_REPO: ci-test
    steps:
      - name: Exchange GitHub OIDC token for Artifact Keeper token
        run: |
          GITHUB_JWT=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=artifact-keeper" \
            | jq -r '.value')
          RESPONSE=$(curl -sf -X POST \
            "$AK_URL/api/v1/auth/ci/token" \
            -H "Authorization: Bearer $GITHUB_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"provider_id\": \"$AK_PROVIDER_ID\"}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          CI_USERNAME=$(echo "$RESPONSE"  | jq -r '.username // empty')
          [ -n "$ACCESS_TOKEN" ] || { echo "ERROR: No access_token"; exit 1; }
          [ -n "$CI_USERNAME"  ] || { echo "ERROR: No username"; exit 1; }
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "CI_USERNAME=$CI_USERNAME"   >> "$GITHUB_ENV"
          echo "==> Authenticated as: $CI_USERNAME"

      - name: Docker login and push
        run: |
          echo "$ACCESS_TOKEN" | \
            docker login "$AK_REGISTRY" \
              --username "$CI_USERNAME" \
              --password-stdin
          IMAGE="$AK_REGISTRY/$AK_REPO/hello:${{ github.run_number }}"
          printf 'FROM busybox:latest\nLABEL build.run="%s"\n' "$GITHUB_RUN_NUMBER" > Dockerfile
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "==> Pushed $IMAGE"

  # --- Maven ---
  push-maven:
    runs-on: ubuntu-latest
    env:
      AK_REPO: ci-test-maven
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Exchange GitHub OIDC token for Artifact Keeper token
        run: |
          GITHUB_JWT=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=artifact-keeper" \
            | jq -r '.value')
          RESPONSE=$(curl -sf -X POST \
            "$AK_URL/api/v1/auth/ci/token" \
            -H "Authorization: Bearer $GITHUB_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"provider_id\": \"$AK_PROVIDER_ID\"}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          CI_USERNAME=$(echo "$RESPONSE"  | jq -r '.username // empty')
          [ -n "$ACCESS_TOKEN" ] || { echo "ERROR: No access_token"; exit 1; }
          [ -n "$CI_USERNAME"  ] || { echo "ERROR: No username"; exit 1; }
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "CI_USERNAME=$CI_USERNAME"   >> "$GITHUB_ENV"
          echo "==> Authenticated as: $CI_USERNAME"

      - name: Deploy Maven artifact
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<XMLEOF
          <settings><servers><server>
            <id>artifact-keeper</id>
            <username>${CI_USERNAME}</username>
            <password>${ACCESS_TOKEN}</password>
          </server></servers></settings>
          XMLEOF
          mkdir -p demo/src/main/java/demo
          echo 'package demo; public class Hello {}' > demo/src/main/java/demo/Hello.java
          cat > demo/pom.xml <<XMLEOF
          <project><modelVersion>4.0.0</modelVersion>
            <groupId>com.example</groupId><artifactId>hello-ci</artifactId>
            <version>0.0.${{ github.run_number }}</version>
            <distributionManagement><repository>
              <id>artifact-keeper</id>
              <url>${AK_URL}/maven/${AK_REPO}</url>
            </repository></distributionManagement>
          </project>
          XMLEOF
          cd demo && mvn --batch-mode deploy -DskipTests
          echo "==> Deployed hello-ci 0.0.${{ github.run_number }}"

  # --- npm ---
  push-npm:
    runs-on: ubuntu-latest
    env:
      AK_REPO: ci-test-npm
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Exchange GitHub OIDC token for Artifact Keeper token
        run: |
          GITHUB_JWT=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=artifact-keeper" \
            | jq -r '.value')
          RESPONSE=$(curl -sf -X POST \
            "$AK_URL/api/v1/auth/ci/token" \
            -H "Authorization: Bearer $GITHUB_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"provider_id\": \"$AK_PROVIDER_ID\"}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          CI_USERNAME=$(echo "$RESPONSE"  | jq -r '.username // empty')
          [ -n "$ACCESS_TOKEN" ] || { echo "ERROR: No access_token"; exit 1; }
          [ -n "$CI_USERNAME"  ] || { echo "ERROR: No username"; exit 1; }
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "CI_USERNAME=$CI_USERNAME"   >> "$GITHUB_ENV"
          echo "==> Authenticated as: $CI_USERNAME"

      - name: Publish npm package
        run: |
          REGISTRY_URL="${AK_URL}/npm/${AK_REPO}/"
          mkdir hello-npm && cd hello-npm
          cat > .npmrc <<RCEOF
          @ci:registry=${AK_URL}/npm/${AK_REPO}/
          //${AK_REGISTRY}/npm/${AK_REPO}/:_authToken=${ACCESS_TOKEN}
          //${AK_REGISTRY}/npm/${AK_REPO}/:always-auth=true
          RCEOF
          printf '{"name":"@ci/hello-npm","version":"0.0.${{ github.run_number }}","description":"CI OIDC test"}' > package.json
          npm publish --registry "${REGISTRY_URL}"
          echo "==> Published @ci/hello-npm 0.0.${{ github.run_number }}"

  # --- PyPI ---
  push-pypi:
    runs-on: ubuntu-latest
    env:
      AK_REPO: ci-test-pypi
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Exchange GitHub OIDC token for Artifact Keeper token
        run: |
          GITHUB_JWT=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=artifact-keeper" \
            | jq -r '.value')
          RESPONSE=$(curl -sf -X POST \
            "$AK_URL/api/v1/auth/ci/token" \
            -H "Authorization: Bearer $GITHUB_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"provider_id\": \"$AK_PROVIDER_ID\"}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          CI_USERNAME=$(echo "$RESPONSE"  | jq -r '.username // empty')
          [ -n "$ACCESS_TOKEN" ] || { echo "ERROR: No access_token"; exit 1; }
          [ -n "$CI_USERNAME"  ] || { echo "ERROR: No username"; exit 1; }
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "CI_USERNAME=$CI_USERNAME"   >> "$GITHUB_ENV"
          echo "==> Authenticated as: $CI_USERNAME"

      - name: Build and upload Python sdist
        run: |
          pip install build twine --quiet
          mkdir -p hello_pypi/hello_pypi_pkg
          touch hello_pypi/hello_pypi_pkg/__init__.py
          cat > hello_pypi/pyproject.toml <<TOMLEOF
          [build-system]
          requires = ["setuptools"]
          build-backend = "setuptools.build_meta"
          [project]
          name = "hello-pypi-ci"
          version = "0.0.${{ github.run_number }}"
          TOMLEOF
          cd hello_pypi && python -m build --sdist
          twine upload \
            --repository-url "$AK_URL/pypi/$AK_REPO/" \
            --username "$CI_USERNAME" \
            --password "$ACCESS_TOKEN" \
            --non-interactive dist/*
          echo "==> Published hello-pypi-ci 0.0.${{ github.run_number }}"

  # --- NuGet ---
  push-nuget:
    runs-on: ubuntu-latest
    env:
      AK_REPO: ci-test-nuget
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Exchange GitHub OIDC token for Artifact Keeper token
        run: |
          GITHUB_JWT=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=artifact-keeper" \
            | jq -r '.value')
          RESPONSE=$(curl -sf -X POST \
            "$AK_URL/api/v1/auth/ci/token" \
            -H "Authorization: Bearer $GITHUB_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"provider_id\": \"$AK_PROVIDER_ID\"}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          CI_USERNAME=$(echo "$RESPONSE"  | jq -r '.username // empty')
          [ -n "$ACCESS_TOKEN" ] || { echo "ERROR: No access_token"; exit 1; }
          [ -n "$CI_USERNAME"  ] || { echo "ERROR: No username"; exit 1; }
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "CI_USERNAME=$CI_USERNAME"   >> "$GITHUB_ENV"
          echo "==> Authenticated as: $CI_USERNAME"

      - name: Pack and push NuGet package
        run: |
          dotnet nuget add source "$AK_URL/nuget/$AK_REPO/v3/index.json" \
            --name artifact-keeper \
            --username "$CI_USERNAME" \
            --password "$ACCESS_TOKEN" \
            --store-password-in-clear-text
          mkdir HelloNuget && cd HelloNuget
          dotnet new classlib -n HelloCi --force
          cd HelloCi
          sed -i "s|<Version>.*</Version>|<Version>0.0.${{ github.run_number }}</Version>|" HelloCi.csproj
          dotnet pack -c Release -o ./nupkgs
          NUPKG=$(ls ./nupkgs/*.nupkg | head -n 1)
          curl -sfS -X PUT "$AK_URL/nuget/$AK_REPO/api/v2/package" \
            -H "X-NuGet-ApiKey: $ACCESS_TOKEN" \
            --upload-file "$NUPKG"
          echo "==> Pushed HelloCi 0.0.${{ github.run_number }}"

  # --- Helm ---
  push-helm:
    runs-on: ubuntu-latest
    env:
      AK_REPO: ci-test-helm
    steps:
      - uses: azure/setup-helm@v4

      - name: Exchange GitHub OIDC token for Artifact Keeper token
        run: |
          GITHUB_JWT=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=artifact-keeper" \
            | jq -r '.value')
          RESPONSE=$(curl -sf -X POST \
            "$AK_URL/api/v1/auth/ci/token" \
            -H "Authorization: Bearer $GITHUB_JWT" \
            -H "Content-Type: application/json" \
            -d "{\"provider_id\": \"$AK_PROVIDER_ID\"}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          CI_USERNAME=$(echo "$RESPONSE"  | jq -r '.username // empty')
          [ -n "$ACCESS_TOKEN" ] || { echo "ERROR: No access_token"; exit 1; }
          [ -n "$CI_USERNAME"  ] || { echo "ERROR: No username"; exit 1; }
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "CI_USERNAME=$CI_USERNAME"   >> "$GITHUB_ENV"
          echo "==> Authenticated as: $CI_USERNAME"

      - name: Package and push Helm chart
        run: |
          helm create hello-chart
          sed -i "s/^version:.*/version: 0.0.${{ github.run_number }}/" hello-chart/Chart.yaml
          helm package hello-chart
          helm registry login "$AK_REGISTRY" \
            --username "$CI_USERNAME" \
            --password "$ACCESS_TOKEN"
          helm push hello-chart-0.0.${{ github.run_number }}.tgz \
            oci://"$AK_REGISTRY"/"$AK_REPO"
          echo "==> Pushed hello-chart 0.0.${{ github.run_number }}"

  # --- Summary ---
  summary:
    runs-on: ubuntu-latest
    needs: [push-docker, push-maven, push-npm, push-pypi, push-nuget, push-helm]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## CI OIDC — Tier 1 Format Results" >> $GITHUB_STEP_SUMMARY
          echo "| Format | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.push-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Maven  | ${{ needs.push-maven.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| npm    | ${{ needs.push-npm.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI   | ${{ needs.push-pypi.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| NuGet  | ${{ needs.push-nuget.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm   | ${{ needs.push-helm.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "Registry: \`${{ env.AK_URL }}\`  Run: \`${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
